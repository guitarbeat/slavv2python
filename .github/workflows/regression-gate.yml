name: Regression Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[app,workspace,zarr]"
        
    - name: Format Check (Ruff)
      run: python -m ruff format --check slavv_python tests
      
    - name: Lint Check (Ruff)
      run: python -m ruff check slavv_python tests
      
    - name: Type Check (Mypy)
      run: python -m mypy
      
    - name: Unit Tests (Pytest)
      run: python -m pytest tests/unit tests/integration/test_paper_profile_ci.py tests/integration/parity/ -m "not slow"
